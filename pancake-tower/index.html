<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FFF3E0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Torre di Pancake 🥞</title>
<style>
  :root{
    --ink:#5b3a29;
    --ink-soft:#8a6a55;
    --cream:#fff3e0;
    --pink:#ffe0ea;
    --accent:#ff8aa0;
    --gold:#f6b545;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; height:100%;
    overscroll-behavior:none; touch-action:manipulation;
    user-select:none; -webkit-user-select:none;
    font-family:ui-rounded,"SF Pro Rounded","Nunito",-apple-system,system-ui,sans-serif;
    background:linear-gradient(160deg,#ffe9cf,#ffd9e6);
    color:var(--ink);
  }
  #app{
    position:relative; height:100dvh; width:100%;
    max-width:480px; margin:0 auto; overflow:hidden;
    box-shadow:0 0 60px rgba(180,110,90,.18);
  }
  canvas{ display:block; width:100%; height:100%; touch-action:none; }

  /* ---- HUD ---- */
  #hud{
    position:absolute; inset:0; pointer-events:none;
    padding:max(14px,env(safe-area-inset-top)) 16px 16px;
    display:flex; flex-direction:column;
  }
  .topbar{ display:flex; align-items:center; justify-content:space-between; }
  .pill{
    pointer-events:auto;
    width:42px; height:42px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; text-decoration:none; color:var(--ink);
    background:rgba(255,255,255,.65); backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.7);
    box-shadow:0 4px 12px rgba(180,110,90,.18);
    cursor:pointer;
  }
  .pill:active{ transform:scale(.92); }
  #score{
    font-size:46px; font-weight:800; letter-spacing:.5px;
    text-shadow:0 2px 0 rgba(255,255,255,.7); line-height:1;
    text-align:center;
  }
  #scoreWrap{ text-align:center; }
  #best{ font-size:13px; font-weight:700; color:var(--ink-soft); margin-top:2px; }

  /* ---- Overlays (start / game over) ---- */
  .overlay{
    position:absolute; inset:0; z-index:5;
    display:flex; align-items:center; justify-content:center;
    padding:24px; pointer-events:auto;
  }
  .overlay.hidden{ display:none; }
  .card{
    width:100%; max-width:320px; text-align:center;
    background:rgba(255,255,255,.86); backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.9);
    border-radius:28px; padding:30px 24px 26px;
    box-shadow:0 18px 50px rgba(180,110,90,.28);
  }
  .emoji{ font-size:62px; line-height:1; filter:drop-shadow(0 6px 6px rgba(180,110,90,.25)); }
  .stack-emoji{ display:inline-block; animation:bob 1.8s ease-in-out infinite; }
  @keyframes bob{ 0%,100%{ transform:translateY(0) rotate(-3deg);} 50%{ transform:translateY(-8px) rotate(3deg);} }
  .title{ font-size:28px; font-weight:800; margin:14px 0 4px; }
  .subtitle{ font-size:15px; font-weight:600; color:var(--ink-soft); margin:0 0 20px; line-height:1.4; }
  .bigscore{ font-size:54px; font-weight:800; margin:6px 0 0; }
  .bigscore small{ font-size:18px; font-weight:700; color:var(--ink-soft); }
  .newbest{ font-size:14px; font-weight:800; color:var(--accent); margin-top:6px; height:18px; }
  .btn{
    display:inline-block; width:100%; margin-top:20px;
    padding:16px; border:none; border-radius:18px;
    font-family:inherit; font-size:19px; font-weight:800; color:#fff;
    background:linear-gradient(135deg,#ff9bb0,#ff7e9a);
    box-shadow:0 8px 22px rgba(255,126,154,.45);
    cursor:pointer;
  }
  .btn:active{ transform:translateY(2px); box-shadow:0 4px 12px rgba(255,126,154,.45); }
  .menu-link{ display:inline-block; margin-top:14px; font-size:14px; font-weight:700; color:var(--ink-soft); text-decoration:none; }

  /* ---- tap hint ---- */
  #hint{
    position:absolute; left:0; right:0; top:54%;
    text-align:center; font-size:17px; font-weight:800; color:var(--ink);
    text-shadow:0 2px 0 rgba(255,255,255,.7);
    animation:pulse 1.1s ease-in-out infinite; pointer-events:none;
  }
  #hint.hidden{ display:none; }
  @keyframes pulse{ 0%,100%{ transform:translateY(0); opacity:.55; } 50%{ transform:translateY(-6px); opacity:1; } }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="topbar">
      <a class="pill" href="../" aria-label="Menu">‹</a>
      <div id="scoreWrap">
        <div id="score">0</div>
        <div id="best">record 0</div>
      </div>
      <button class="pill" id="muteBtn" aria-label="Audio">🔊</button>
    </div>
  </div>

  <div id="hint" class="hidden">tocca per impilare 👆</div>

  <!-- Start -->
  <div class="overlay" id="startOverlay">
    <div class="card">
      <div class="emoji"><span class="stack-emoji">🥞</span></div>
      <div class="title">Torre di Pancake</div>
      <p class="subtitle">Tocca a tempo per impilare i pancake.<br>Più sei preciso, più alta la torre!</p>
      <button class="btn" id="playBtn">Gioca</button>
      <a class="menu-link" href="../">← tutti i giochi</a>
    </div>
  </div>

  <!-- Game over -->
  <div class="overlay hidden" id="overOverlay">
    <div class="card">
      <div class="emoji" id="overEmoji">🥞</div>
      <div class="title" id="overTitle">Ops!</div>
      <div class="bigscore"><span id="finalScore">0</span> <small>pancake</small></div>
      <div class="newbest" id="newBest"></div>
      <button class="btn" id="retryBtn">Rigioca</button>
      <a class="menu-link" href="../">← tutti i giochi</a>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  // ---------- setup ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('app');

  const elScore = document.getElementById('score');
  const elBest  = document.getElementById('best');
  const startOverlay = document.getElementById('startOverlay');
  const overOverlay  = document.getElementById('overOverlay');
  const elFinal = document.getElementById('finalScore');
  const elNewBest = document.getElementById('newBest');
  const elOverTitle = document.getElementById('overTitle');
  const elOverEmoji = document.getElementById('overEmoji');
  const hint = document.getElementById('hint');
  const muteBtn = document.getElementById('muteBtn');

  // logical canvas size + layout constants (recomputed on resize)
  let W = 0, H = 0;
  let plateY = 0, activeBandTopY = 0, baseWidth = 240;
  const BLOCK_H = 30;
  const PERFECT_EPS = 6;   // px tolerance for a "perfect"
  const GROW = 10;         // width reward on a perfect
  const GRAVITY = 1700;    // px/s^2 for falling slices

  // ---------- state ----------
  let state = 'menu';           // 'menu' | 'playing' | 'over'
  let blocks = [];              // placed pancakes {x,width,placeAnim,hue}
  let active = null;            // moving pancake {x,width,dir}
  let slices = [];             // falling overhang pieces (world-space Y)
  let particles = [];          // sparkles (world-space Y)
  let floats = [];             // floating texts (world-space Y)
  let viewY = 0;               // camera offset (0 = plate at the bottom)
  let score = 0, perfectStreak = 0;
  let best = parseInt(localStorage.getItem('pancakeTowerBest') || '0', 10) || 0;
  let firstDropDone = false;

  function resize(){
    const rect = wrap.getBoundingClientRect();
    const oldW = W;
    W = rect.width; H = rect.height;
    const dpr = Math.min(window.devicePixelRatio || 1, 3);
    canvas.width  = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    plateY = H * 0.82;             // base pancake rests near the bottom
    activeBandTopY = H * 0.22;     // tower scrolls only once it climbs this high
    baseWidth = Math.max(120, Math.min(W * 0.6, 300));
    // if the width really changed (rotation), rescale the tower so the math stays valid
    if (oldW && oldW !== W){
      const k = W / oldW;
      for (const b of blocks){ b.x *= k; b.width *= k; }
      if (active){ active.x *= k; active.width *= k; }
    }
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 100));
  resize();

  // ---------- audio ----------
  let actx = null;
  let muted = localStorage.getItem('pancakeTowerMuted') === '1';
  muteBtn.textContent = muted ? '🔇' : '🔊';

  function ensureAudio(){
    if (actx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) actx = new AC();
  }
  // must be called from a user gesture; also recovers a context suspended by iOS
  function resumeAudio(){
    ensureAudio();
    if (actx && actx.state === 'suspended') actx.resume();
  }
  function tone(f, dur, type, vol, delay){
    if (muted || !actx) return;
    const t = actx.currentTime + (delay || 0);
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.value = f;
    o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur + 0.03);
  }
  function sound(name){
    if (name === 'place')   tone(170 + Math.min(perfectStreak, 8) * 14, 0.12, 'sine', 0.18, 0);
    if (name === 'perfect'){ tone(523, 0.12, 'triangle', 0.18, 0); tone(784, 0.16, 'triangle', 0.16, 0.07); }
    if (name === 'over'){ tone(150, 0.5, 'sawtooth', 0.15, 0); tone(80, 0.6, 'sine', 0.12, 0.03); }
  }
  function buzz(ms){ if (navigator.vibrate) navigator.vibrate(ms); }

  muteBtn.addEventListener('click', () => {
    muted = !muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
    localStorage.setItem('pancakeTowerMuted', muted ? '1' : '0');
    if (!muted) resumeAudio();
  });

  // ---------- helpers ----------
  function clamp(v, a, b){ return v < a ? a : (v > b ? b : v); }
  // hardened: never feeds arcTo a negative radius / non-positive size (would throw and kill the loop)
  function roundRect(x, y, w, h, r){
    if (!(w > 0) || !(h > 0)){ ctx.beginPath(); return; }
    r = Math.max(0, Math.min(r, w / 2, h / 2));
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // screen Y of a block's top edge for a given stack level (camera-aware)
  function topYFor(level){ return (plateY - level * BLOCK_H - BLOCK_H) + viewY; }

  function drawPancake(x, y, w, h, level, isTop){
    if (w <= 0 || h <= 0) return;
    const lift = (level % 2) * 3;
    const grad = ctx.createLinearGradient(0, y, 0, y + h);
    grad.addColorStop(0,   `hsl(39,80%,${72 - lift}%)`);
    grad.addColorStop(0.55,`hsl(35,74%,${64 - lift}%)`);
    grad.addColorStop(1,   `hsl(28,64%,${48 - lift}%)`);
    // soft contact shadow
    ctx.save();
    ctx.fillStyle = 'rgba(150,90,70,.16)';
    roundRect(x + 3, y + h * 0.55, w - 6, h * 0.7, h * 0.4); ctx.fill();
    ctx.restore();
    // body
    roundRect(x, y, w, h, h * 0.45);
    ctx.fillStyle = grad; ctx.fill();
    ctx.lineWidth = Math.max(1, h * 0.05);
    ctx.strokeStyle = 'hsla(26,55%,38%,.45)'; ctx.stroke();
    // top sheen
    roundRect(x + w * 0.12, y + h * 0.14, w * 0.46, h * 0.2, h * 0.1);
    ctx.fillStyle = 'hsla(48,92%,90%,.5)'; ctx.fill();

    if (isTop && w > 24){
      // syrup pool dripping over the front edge
      ctx.fillStyle = 'hsl(27,58%,33%)';
      roundRect(x + w * 0.22, y - h * 0.12, w * 0.56, h * 0.55, h * 0.26); ctx.fill();
      ctx.beginPath();
      ctx.ellipse(x + w * 0.36, y + h * 0.5, h * 0.16, h * 0.22, 0, 0, 7);
      ctx.ellipse(x + w * 0.6,  y + h * 0.55, h * 0.13, h * 0.2, 0, 0, 7);
      ctx.fill();
      ctx.fillStyle = 'hsla(33,70%,60%,.45)';
      roundRect(x + w * 0.3, y - h * 0.06, w * 0.18, h * 0.14, h * 0.07); ctx.fill();
      // butter pat
      ctx.fillStyle = '#ffe79a';
      roundRect(x + w * 0.43, y - h * 0.22, w * 0.16, h * 0.34, 3); ctx.fill();
      ctx.fillStyle = '#f8cf6b';
      roundRect(x + w * 0.43, y + h * 0.0, w * 0.16, h * 0.12, 3); ctx.fill();
    }
  }

  // slices/particles/floats store WORLD Y (screen Y minus camera); viewY is added back at draw time
  function spawnSlice(x, screenY, w, dir, full){
    if (w < 1) return;
    slices.push({
      x, y: screenY - viewY, w, h: BLOCK_H,
      vx: dir * (50 + Math.random() * 70),
      vy: (full ? -40 : -20) - Math.random() * 50,
      rot: 0, vrot: dir * (2 + Math.random() * 3),
      hue: blocks.length, a: 1
    });
  }
  function addParticles(x, screenY){
    const wy = screenY - viewY;
    for (let i = 0; i < 16; i++){
      const ang = Math.random() * Math.PI * 2;
      const sp = 60 + Math.random() * 160;
      particles.push({ x, y: wy, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 40, life: 1, hue: 45 + Math.random() * 12 });
    }
  }
  function addFloat(text, x, screenY){ floats.push({ text, x, y: screenY - viewY, life: 1 }); }

  // ---------- game flow ----------
  function reset(){
    blocks = []; slices = []; particles = []; floats = [];
    viewY = 0; score = 0; perfectStreak = 0; firstDropDone = false;
    active = { x: (W - baseWidth) / 2, width: baseWidth, dir: 1 };
    updateHud();
  }
  function start(){
    resumeAudio();
    reset();
    state = 'playing';
    startOverlay.classList.add('hidden');
    overOverlay.classList.add('hidden');
    hint.classList.remove('hidden');
  }
  function updateHud(){
    elScore.textContent = score;
    elBest.textContent = 'record ' + best;
  }
  function newActive(width){
    const dir = Math.random() < 0.5 ? 1 : -1;
    active = { x: dir > 0 ? 0 : W - width, width, dir };
  }
  function drop(){
    if (state !== 'playing') return;
    const level = blocks.length;
    const top = topYFor(level);

    if (level === 0){
      blocks.push({ x: active.x, width: active.width, placeAnim: 1, hue: 0 });
      sound('place'); buzz(8);
      newActive(active.width);
      score += 1; updateHud();
      finishFirstDrop();
      return;
    }

    const below = blocks[level - 1];
    const newLeft  = Math.max(active.x, below.x);
    const newRight = Math.min(active.x + active.width, below.x + below.width);
    const overlap = newRight - newLeft;

    if (overlap <= 0){
      gameOver(top);
      return;
    }

    let px = newLeft, pw = overlap, perfect = false;
    if (Math.abs(active.x - below.x) <= PERFECT_EPS){
      // snap perfectly onto the block below (no shrink, small reward)
      perfect = true;
      pw = Math.min(baseWidth, below.width + GROW);
      px = clamp(below.x - (pw - below.width) / 2, 0, W - pw);
      perfectStreak += 1;
      score += 1 + perfectStreak;
      addParticles(px + pw / 2, top);
      addFloat(perfectStreak > 1 ? 'PERFETTO x' + perfectStreak : 'PERFETTO!', px + pw / 2, top - 6);
      sound('perfect'); buzz(20);
    } else {
      // shave the overhang off as a falling slice
      if (active.x < newLeft) spawnSlice(active.x, top, newLeft - active.x, -1);
      if (active.x + active.width > newRight) spawnSlice(newRight, top, (active.x + active.width) - newRight, 1);
      perfectStreak = 0;
      score += 1;
      sound('place'); buzz(8);
    }

    blocks.push({ x: px, width: pw, placeAnim: 1, hue: level });
    newActive(pw);
    updateHud();
    finishFirstDrop();
  }
  function finishFirstDrop(){
    if (!firstDropDone){ firstDropDone = true; hint.classList.add('hidden'); }
  }
  function gameOver(top){
    spawnSlice(active.x, top, active.width, active.x < W / 2 ? -1 : 1, true);
    state = 'over';
    sound('over'); buzz(40);
    const isBest = score > best;
    if (isBest){ best = score; localStorage.setItem('pancakeTowerBest', String(best)); }
    updateHud();
    elFinal.textContent = score;
    elNewBest.textContent = isBest && score > 0 ? '🎉 nuovo record!' : '';
    if (score >= 20){ elOverTitle.textContent = 'Che torre!'; elOverEmoji.textContent = '🤩'; }
    else if (score >= 8){ elOverTitle.textContent = 'Bel piatto!'; elOverEmoji.textContent = '😋'; }
    else { elOverTitle.textContent = 'Ops!'; elOverEmoji.textContent = '🥞'; }
    setTimeout(() => overOverlay.classList.remove('hidden'), 650);
  }

  // ---------- update + render ----------
  function update(dt){
    // move active pancake
    if (state === 'playing' && active){
      const speed = clamp(150 + score * 7, 150, 470);
      active.x += active.dir * speed * dt;
      if (active.x < 0){ active.x = 0; active.dir = 1; }
      if (active.x + active.width > W){ active.x = W - active.width; active.dir = -1; }
    }
    // camera: keep the plate at the bottom until the tower climbs past the band, then scroll up
    const level = blocks.length;
    const targetView = Math.max(0, activeBandTopY - (plateY - level * BLOCK_H - BLOCK_H));
    viewY += (targetView - viewY) * Math.min(1, dt * 6);

    // placed-block squash decay
    for (const b of blocks){ if (b.placeAnim > 0){ b.placeAnim *= Math.pow(0.001, dt); if (b.placeAnim < 0.02) b.placeAnim = 0; } }

    // slices (world-space)
    for (const s of slices){ s.vy += GRAVITY * dt; s.x += s.vx * dt; s.y += s.vy * dt; s.rot += s.vrot * dt; }
    slices = slices.filter(s => s.y + viewY < H + 160);

    // particles
    for (const p of particles){ p.vy += 700 * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt * 1.6; }
    particles = particles.filter(p => p.life > 0);

    // floats
    for (const f of floats){ f.y -= dt * 40; f.life -= dt * 1.1; }
    floats = floats.filter(f => f.life > 0);
  }

  function render(){
    // background
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#fff3e0');
    bg.addColorStop(1, '#ffdfe9');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
    // soft bokeh (fixed to the screen, like an ambient layer)
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,.35)';
    ctx.beginPath(); ctx.arc(W * 0.18, H * 0.16, 46, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.arc(W * 0.82, H * 0.1, 30, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,180,200,.22)';
    ctx.beginPath(); ctx.arc(W * 0.86, H * 0.38, 60, 0, 7); ctx.fill();
    ctx.restore();

    // plate under the base pancake
    const plateScreenY = topYFor(-1);
    ctx.save();
    ctx.fillStyle = 'rgba(150,90,70,.16)';
    ctx.beginPath(); ctx.ellipse(W / 2, plateScreenY + 12, W * 0.46, 16, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#fdf7f2';
    ctx.beginPath(); ctx.ellipse(W / 2, plateScreenY + 6, W * 0.45, 14, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#f0e6df';
    ctx.beginPath(); ctx.ellipse(W / 2, plateScreenY + 4, W * 0.3, 8, 0, 0, 7); ctx.fill();
    ctx.restore();

    // placed pancakes (bottom -> top), with squash-and-stretch on landing
    for (let i = 0; i < blocks.length; i++){
      const b = blocks[i];
      const y = topYFor(i);
      if (y > H + BLOCK_H || y < -BLOCK_H * 2) continue;
      const sq = b.placeAnim || 0;
      const h = BLOCK_H * (1 - 0.22 * sq);
      const w = b.width * (1 + 0.10 * sq);
      drawPancake(b.x - (w - b.width) / 2, y + (BLOCK_H - h), w, h, i, false);
    }

    // active pancake (with syrup + butter)
    if (state === 'playing' && active){
      drawPancake(active.x, topYFor(blocks.length), active.width, BLOCK_H, blocks.length, true);
    }

    // falling slices
    for (const s of slices){
      ctx.save();
      ctx.globalAlpha = clamp(s.a, 0, 1);
      ctx.translate(s.x + s.w / 2, s.y + viewY + s.h / 2);
      ctx.rotate(s.rot);
      drawPancake(-s.w / 2, -s.h / 2, s.w, s.h, s.hue, false);
      ctx.restore();
    }

    // particles
    for (const p of particles){
      ctx.save();
      ctx.globalAlpha = clamp(p.life, 0, 1);
      ctx.fillStyle = `hsl(${p.hue},95%,62%)`;
      ctx.beginPath(); ctx.arc(p.x, p.y + viewY, 3.2, 0, 7); ctx.fill();
      ctx.restore();
    }

    // floating "PERFETTO" texts (pop in big, settle, gold->pink gradient)
    for (const f of floats){
      ctx.save();
      ctx.globalAlpha = clamp(f.life, 0, 1);
      const scale = 1 + 0.25 * clamp(f.life, 0, 1);
      ctx.translate(f.x, f.y + viewY);
      ctx.scale(scale, scale);
      ctx.font = '800 22px ui-rounded, "SF Pro Rounded", Nunito, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(255,255,255,.9)';
      ctx.strokeText(f.text, 0, 0);
      const g = ctx.createLinearGradient(0, -12, 0, 8);
      g.addColorStop(0, '#ffd24a'); g.addColorStop(1, '#ff5f86');
      ctx.fillStyle = g;
      ctx.fillText(f.text, 0, 0);
      ctx.restore();
    }
  }

  // ---------- loop ----------
  let last = 0;
  function loop(ts){
    if (!last) last = ts;
    let dt = (ts - last) / 1000; last = ts;
    if (dt > 0.05) dt = 0.05;       // clamp big gaps (tab switch)
    try {
      update(dt);
      render();
    } catch (err){
      // never let a draw error kill the animation loop
      if (window.console) console.error('[pancake] frame error', err);
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ---------- input ----------
  canvas.addEventListener('pointerdown', (e) => {
    if (!e.isPrimary) return;       // ignore second finger / palm
    e.preventDefault();
    resumeAudio();
    drop();
  }, { passive: false });

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'Enter'){
      e.preventDefault();
      resumeAudio();
      if (state === 'playing'){ drop(); return; }
      // only (re)start when a menu/over overlay is actually on screen
      if (!startOverlay.classList.contains('hidden') || !overOverlay.classList.contains('hidden')) start();
    }
  });

  document.getElementById('playBtn').addEventListener('click', start);
  document.getElementById('retryBtn').addEventListener('click', start);
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') resumeAudio(); });

  updateHud();

  // --- test seam: exposes internals to the jsc test suite; completely inert in the browser ---
  if (typeof window !== 'undefined' && window.__PANCAKE_TEST__){
    window.__PANCAKE_TEST__.api = {
      drawPancake, roundRect, topYFor, start, drop,
      state: () => state,
      blocks: () => blocks,
      active: () => active,
      score: () => score,
      baseWidth: () => baseWidth,
      dims: () => ({ W, H })
    };
  }
})();
</script>
</body>
</html>
