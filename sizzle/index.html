<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FFD9A8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Sizzle 🍢</title>
<style>
  :root{
    --ink:#5b3116;
    --ink-soft:#9a6a3f;
    --accent:#ff7a3c;
    --gold:#f6b545;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; height:100%;
    overscroll-behavior:none; touch-action:manipulation;
    user-select:none; -webkit-user-select:none;
    font-family:ui-rounded,"SF Pro Rounded","Nunito",-apple-system,system-ui,sans-serif;
    background:linear-gradient(160deg,#ffd9a8,#ffb27a);
    color:var(--ink);
  }
  #app{
    position:relative; height:100dvh; width:100%;
    max-width:480px; margin:0 auto; overflow:hidden;
    box-shadow:0 0 60px rgba(150,80,30,.2);
  }
  canvas{ display:block; width:100%; height:100%; touch-action:none; }

  /* ---- HUD ---- */
  #hud{
    position:absolute; inset:0; z-index:6; pointer-events:none;
    padding:max(14px,env(safe-area-inset-top)) 16px 16px;
    display:flex; flex-direction:column;
  }
  .topbar{ display:flex; align-items:flex-start; justify-content:space-between; }
  .pill{
    pointer-events:auto;
    width:42px; height:42px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; text-decoration:none; color:var(--ink);
    background:rgba(255,255,255,.7); backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.75);
    box-shadow:0 4px 12px rgba(150,80,30,.2);
    cursor:pointer;
  }
  .pill:active{ transform:scale(.92); }
  #scoreWrap{ text-align:center; }
  #scoreWrap.hidden{ visibility:hidden; }
  #score{
    font-size:46px; font-weight:800; letter-spacing:.5px;
    text-shadow:0 2px 0 rgba(255,255,255,.6); line-height:1; text-align:center;
  }
  #best{ font-size:13px; font-weight:700; color:var(--ink-soft); margin-top:2px; }
  #strikes{ font-size:20px; margin-top:6px; letter-spacing:2px; height:24px; }

  /* ---- Overlays ---- */
  .overlay{
    position:absolute; inset:0; z-index:5;
    display:flex; align-items:center; justify-content:center;
    padding:24px; pointer-events:auto;
  }
  .overlay.hidden{ display:none; }
  .card{
    width:100%; max-width:320px; text-align:center;
    background:rgba(255,255,255,.88); backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.9);
    border-radius:28px; padding:30px 24px 26px;
    box-shadow:0 18px 50px rgba(150,80,30,.3);
  }
  .emoji{ font-size:62px; line-height:1; filter:drop-shadow(0 6px 6px rgba(150,80,30,.28)); }
  .spin-emoji{ display:inline-block; animation:spin 3s linear infinite; }
  @keyframes spin{ from{ transform:rotate(0); } to{ transform:rotate(360deg); } }
  .title{ font-size:28px; font-weight:800; margin:14px 0 4px; }
  .subtitle{ font-size:15px; font-weight:600; color:var(--ink-soft); margin:0 0 20px; line-height:1.4; }
  .bigscore{ font-size:54px; font-weight:800; margin:6px 0 0; }
  .newbest{ font-size:14px; font-weight:800; color:var(--accent); margin-top:6px; height:18px; }
  .btn{
    display:inline-block; width:100%; margin-top:20px;
    padding:16px; border:none; border-radius:18px;
    font-family:inherit; font-size:19px; font-weight:800; color:#fff;
    background:linear-gradient(135deg,#ff9a4d,#ff6b3c);
    box-shadow:0 8px 22px rgba(255,107,60,.45);
    cursor:pointer;
  }
  .btn:active{ transform:translateY(2px); box-shadow:0 4px 12px rgba(255,107,60,.45); }
  .menu-link{ display:inline-block; margin-top:14px; font-size:14px; font-weight:700; color:var(--ink-soft); text-decoration:none; }

  /* ---- leaderboard ---- */
  .lb{ margin-top:18px; text-align:left; }
  .lb.hidden{ display:none; }
  .lb-entry.hidden{ display:none; }
  .lb-entry-label{ display:block; text-align:center; font-size:14px; font-weight:800; color:var(--accent); margin-bottom:8px; }
  .lb-entry-row{ display:flex; gap:8px; justify-content:center; margin-bottom:14px; }
  .lb-input{
    flex:1; min-width:0; max-width:220px; text-align:center;
    font-family:inherit; font-size:18px; font-weight:800; color:var(--ink);
    padding:10px 12px; border:2px solid var(--accent); border-radius:12px; background:#fff; outline:none;
  }
  .lb-ok{
    padding:0 20px; border:none; border-radius:12px; cursor:pointer;
    font-family:inherit; font-size:16px; font-weight:800; color:#fff;
    background:linear-gradient(135deg,#ff9a4d,#ff6b3c);
  }
  .lb-ok:disabled{ opacity:.5; }
  .lb-list{ list-style:none; margin:0; padding:0; }
  .lb-list li{ display:flex; align-items:center; gap:10px; padding:7px 10px; border-radius:10px; font-weight:700; font-size:15px; }
  .lb-list li:nth-child(odd){ background:rgba(255,140,70,.12); }
  .lb-list li.me{ background:rgba(255,107,60,.24); }
  .lb-rank{ width:22px; text-align:right; color:var(--ink-soft); font-weight:800; }
  .lb-name{ flex:1; letter-spacing:2px; }
  .lb-score{ font-weight:800; color:var(--ink); }
  .lb-status{ margin-top:8px; text-align:center; font-size:13px; font-weight:700; color:var(--ink-soft); min-height:16px; }

  /* ---- tap hint ---- */
  #hint{
    position:absolute; left:0; right:0; top:60%;
    text-align:center; font-size:17px; font-weight:800; color:var(--ink);
    text-shadow:0 2px 0 rgba(255,255,255,.6);
    animation:pulse 1.1s ease-in-out infinite; pointer-events:none;
  }
  #hint.hidden{ display:none; }
  @keyframes pulse{ 0%,100%{ transform:translateY(0); opacity:.55; } 50%{ transform:translateY(-6px); opacity:1; } }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="topbar">
      <a class="pill" href="../" aria-label="Menu">‹</a>
      <div id="scoreWrap">
        <div id="score">0</div>
        <div id="best">best 0</div>
        <div id="strikes"></div>
      </div>
      <button class="pill" id="muteBtn" aria-label="Audio">🔊</button>
    </div>
  </div>

  <div id="hint" class="hidden">tap the moment it hits the fire 🔥</div>

  <!-- Start -->
  <div class="overlay" id="startOverlay">
    <div class="card">
      <div class="emoji"><span class="spin-emoji">🍢</span></div>
      <div class="title">Sizzle</div>
      <p class="subtitle">Tap the instant the piece passes over the&nbsp;fire.<br>Chain PERFECTs to send your score sky-high!</p>
      <button class="btn" id="playBtn">Play</button>
      <a class="menu-link" href="../">← all games</a>
    </div>
  </div>

  <!-- Game over -->
  <div class="overlay hidden" id="overOverlay">
    <div class="card">
      <div class="emoji" id="overEmoji">🍢</div>
      <div class="title" id="overTitle">Burnt!</div>
      <div class="bigscore"><span id="finalScore">0</span></div>
      <div class="newbest" id="newBest"></div>

      <div class="lb hidden" id="lbBox">
        <div class="lb-entry hidden" id="lbEntry">
          <span class="lb-entry-label">You made the board!</span>
          <div class="lb-entry-row">
            <input class="lb-input" id="lbName" maxlength="12" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="your name" aria-label="Your name">
            <button class="lb-ok" id="lbSave">OK</button>
          </div>
        </div>
        <ol class="lb-list" id="lbList"></ol>
        <div class="lb-status" id="lbStatus"></div>
      </div>

      <button class="btn" id="retryBtn">Play again</button>
      <a class="menu-link" href="../">← all games</a>
    </div>
  </div>
</div>

<script src="../shared/leaderboard.js"></script>
<script>
(() => {
  "use strict";

  // ---------- setup ----------
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('app');

  const elScore = document.getElementById('score');
  const elBest  = document.getElementById('best');
  const elStrikes = document.getElementById('strikes');
  const elScoreWrap = document.getElementById('scoreWrap');
  const startOverlay = document.getElementById('startOverlay');
  const overOverlay  = document.getElementById('overOverlay');
  const elFinal = document.getElementById('finalScore');
  const elNewBest = document.getElementById('newBest');
  const elOverTitle = document.getElementById('overTitle');
  const elOverEmoji = document.getElementById('overEmoji');
  const hint = document.getElementById('hint');
  const muteBtn = document.getElementById('muteBtn');
  const lbBox = document.getElementById('lbBox');
  const lbEntry = document.getElementById('lbEntry');
  const lbName = document.getElementById('lbName');
  const lbSave = document.getElementById('lbSave');
  const lbList = document.getElementById('lbList');
  const lbStatus = document.getElementById('lbStatus');

  // ---------- layout ----------
  let W = 0, H = 0, cx = 0, cy = 0, R = 0;
  const STRIKES_MAX = 3;
  const PERFECT = 0.11;      // rad: perfect window (half-width)
  const WINDOW  = 0.30;      // rad: acceptable sear window (half-width)
  const OMEGA0  = 1.9;       // rad/s starting rotation speed
  const OMEGA_MAX = 6.6;
  const COOLDOWN = 0.22;     // s ignore input right after a resolution (also absorbs a reflex follow-up tap)
  const REVERSE_WARN = 1.1;  // s of warning (banner) before the spin flips

  function resize(){
    const rect = wrap.getBoundingClientRect();
    W = rect.width; H = rect.height;
    const dpr = Math.min(window.devicePixelRatio || 1, 3);
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cx = W / 2;
    cy = H * 0.44;
    R = Math.min(W, H) * 0.34;
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 100));

  // ---------- state ----------
  let state = 'menu';        // 'menu' | 'playing' | 'over'
  let arm = 0, dir = 1, omega = OMEGA0;
  let flame = Math.PI * 0.5, prevErr = 0, enteredWindow = false, armed = false;
  let cooldown = 0;
  let score = 0, combo = 0, strikes = 0;
  let best = parseInt(localStorage.getItem('sizzleBest') || '0', 10) || 0;
  let searsUntilReverse = 5, reverseTelegraph = 0, crankAngle = 0, crankTick = 0;
  let clock = 0, shake = 0;
  let particles = [], floats = [], flyers = [], embers = [];
  let plated = 0;
  let firstTapDone = false;

  resize();

  // ---------- audio ----------
  let actx = null;
  let muted = localStorage.getItem('sizzleMuted') === '1';
  muteBtn.textContent = muted ? '🔇' : '🔊';

  function ensureAudio(){
    if (actx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    try { actx = new AC(); } catch (e){ actx = null; }
  }
  function resumeAudio(){
    ensureAudio();
    if (actx && actx.state === 'suspended') actx.resume();
  }
  function tone(f, dur, type, vol, delay){
    if (muted || !actx) return;
    const t = actx.currentTime + (delay || 0);
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.value = f;
    o.connect(g); g.connect(actx.destination);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur + 0.03);
  }
  function sound(name){
    if (name === 'perfect'){ tone(560 + Math.min(combo, 12) * 40, 0.10, 'square', 0.16, 0); tone(880, 0.12, 'triangle', 0.12, 0.05); }
    if (name === 'ok')      tone(320, 0.10, 'sine', 0.14, 0);
    if (name === 'strike')  tone(150, 0.22, 'sawtooth', 0.16, 0);
    if (name === 'over'){ tone(160, 0.5, 'sawtooth', 0.15, 0); tone(70, 0.6, 'sine', 0.12, 0.03); }
    if (name === 'click')   tone(1050, 0.025, 'square', 0.08, 0);   // crank ratchet tick
    if (name === 'clunk'){ tone(200, 0.12, 'square', 0.14, 0); tone(90, 0.15, 'sine', 0.10, 0.01); }   // reversal thunk
  }
  function buzz(ms){ if (navigator.vibrate) navigator.vibrate(ms); }

  // ---------- background music (procedural chiptune loop) ----------
  const BPM = 126;
  const secPerStep = 60 / BPM / 4;
  // castle mood: D-minor + chromatics over a driving eighth-note bass
  const NOTE = {
    D2:73.42, E2:82.41, F2:87.31, G2:98.00, Ab2:103.83, A2:110.00, Bb2:116.54, B2:123.47, C3:130.81, Cs3:138.59, D3:146.83,
    G4:392.00, Ab4:415.30, A4:440.00, Bb4:466.16, B4:493.88,
    C5:523.25, Cs5:554.37, D5:587.33, E5:659.25, F5:698.46, G5:783.99, A5:880.00
  };
  // driving bass: 8 eighth-note roots per bar
  const A_BASS = [
    ['D2','D2','D2','D2','D2','D2','D2','D2'],
    ['D2','D2','D2','D2','F2','F2','E2','D2'],
    ['G2','G2','G2','G2','G2','G2','G2','G2'],
    ['G2','G2','G2','G2','Bb2','Bb2','A2','G2'],
    ['Bb2','Bb2','Bb2','Bb2','Bb2','Bb2','Bb2','Bb2'],
    ['A2','A2','A2','A2','A2','A2','Ab2','A2'],
    ['D2','D2','D2','D2','D2','D2','D2','D2'],
    ['A2','A2','A2','A2','Cs3','Cs3','A2','A2']
  ];
  const B_BASS = [
    ['A2','A2','A2','A2','A2','A2','A2','A2'],
    ['Bb2','Bb2','Bb2','Bb2','Bb2','Bb2','Bb2','Bb2'],
    ['B2','B2','B2','B2','B2','B2','B2','B2'],
    ['C3','C3','C3','C3','C3','C3','C3','C3'],
    ['Cs3','Cs3','Cs3','Cs3','Cs3','Cs3','Cs3','Cs3'],
    ['D3','D3','D3','D3','D3','D3','D3','D3'],
    ['D3','D3','C3','C3','Bb2','Bb2','A2','A2'],
    ['A2','A2','A2','A2','A2','A2','A2','A2']
  ];
  const C_BASS = [
    ['D3','D3','D3','D3','Cs3','Cs3','C3','C3'],
    ['Bb2','Bb2','Bb2','Bb2','A2','A2','Ab2','Ab2'],
    ['G2','G2','G2','G2','G2','G2','G2','G2'],
    ['F2','F2','F2','F2','E2','E2','D2','D2'],
    ['Bb2','Bb2','Bb2','Bb2','Bb2','Bb2','Bb2','Bb2'],
    ['A2','A2','A2','A2','A2','A2','A2','A2'],
    ['G2','G2','F2','F2','E2','E2','D2','D2'],
    ['A2','A2','A2','A2','A2','A2','A2','A2']
  ];
  const BARS = A_BASS.concat(B_BASS, A_BASS, C_BASS);   // 32 bars
  // menacing lead per 8-bar section (relative steps) [step, note, lenSteps]
  const A_LEAD = [
    [0,'D5',3],[4,'F5',3],[8,'E5',2],[10,'D5',2],[12,'Cs5',4],
    [16,'D5',3],[20,'A5',3],[24,'G5',2],[26,'F5',2],[28,'E5',4],
    [32,'G5',3],[36,'Bb4',3],[40,'D5',2],[42,'C5',2],[44,'Bb4',4],
    [48,'A4',3],[52,'C5',3],[56,'Bb4',2],[58,'A4',2],[60,'G4',4],
    [64,'Bb4',3],[68,'D5',3],[72,'F5',2],[74,'D5',2],[76,'Bb4',4],
    [80,'A4',3],[84,'Cs5',3],[88,'E5',2],[90,'Cs5',2],[92,'A4',4],
    [96,'D5',3],[100,'F5',3],[104,'A5',2],[106,'G5',2],[108,'F5',4],
    [112,'E5',3],[116,'Cs5',3],[120,'A4',2],[122,'Cs5',2],[124,'E5',4]
  ];
  const B_LEAD = [
    [0,'A4',3],[4,'C5',3],[8,'E5',2],[10,'C5',2],[12,'A4',4],
    [16,'Bb4',3],[20,'D5',3],[24,'F5',2],[26,'D5',2],[28,'Bb4',4],
    [32,'B4',3],[36,'D5',3],[40,'F5',2],[42,'D5',2],[44,'B4',4],
    [48,'C5',3],[52,'E5',3],[56,'G5',2],[58,'E5',2],[60,'C5',4],
    [64,'Cs5',3],[68,'E5',3],[72,'A5',2],[74,'E5',2],[76,'Cs5',4],
    [80,'D5',3],[84,'F5',3],[88,'A5',2],[90,'F5',2],[92,'D5',4],
    [96,'D5',2],[98,'C5',2],[100,'Bb4',2],[102,'A4',4],[106,'G4',2],[108,'A4',2],
    [112,'A4',3],[116,'Cs5',3],[120,'E5',2],[122,'Cs5',2],[124,'A4',4]
  ];
  const C_LEAD = [
    [0,'D5',3],[4,'Cs5',3],[8,'C5',2],[10,'Bb4',2],[12,'A4',4],
    [16,'Bb4',3],[20,'A4',3],[24,'Ab4',2],[26,'G4',2],[28,'A4',4],
    [32,'G4',3],[36,'Bb4',3],[40,'D5',2],[42,'Bb4',2],[44,'G4',4],
    [48,'F5',3],[52,'E5',3],[56,'D5',2],[58,'C5',2],[60,'Bb4',4],
    [64,'Bb4',3],[68,'D5',3],[72,'F5',2],[74,'D5',2],[76,'Bb4',4],
    [80,'A4',3],[84,'Cs5',3],[88,'E5',2],[90,'Cs5',2],[92,'A4',4],
    [96,'G5',2],[98,'F5',2],[100,'E5',2],[102,'D5',2],[104,'C5',2],[106,'Bb4',2],[108,'A4',4],
    [112,'E5',3],[116,'Cs5',3],[120,'A4',2],[122,'Cs5',2],[124,'A4',4]
  ];
  const LEAD_SECTIONS = [A_LEAD, B_LEAD, A_LEAD, C_LEAD];
  let STEPS = BARS.length * 16;
  const leadAt = new Array(STEPS).fill(null);
  const bassAt = new Array(STEPS).fill(null);
  (function buildSong(){
    for (let b = 0; b < BARS.length; b++){
      const bar = BARS[b];
      for (let j = 0; j < 8; j++){
        const nm = bar[j];
        if (nm) bassAt[b * 16 + j * 2] = { f: NOTE[nm], d: 1.6 * secPerStep };
      }
    }
    for (let s = 0; s < LEAD_SECTIONS.length; s++){
      const off = s * 8 * 16;
      for (const n of LEAD_SECTIONS[s]){
        leadAt[off + n[0]] = { f: NOTE[n[1]], d: n[2] * secPerStep };
      }
    }
  })();

  let musicGain = null, noiseBuffer = null;
  let musicOn = false, musicTimer = null, stepIndex = 0, nextStepTime = 0;

  function musicVolume(){ return muted ? 0 : 0.42; }
  function mNote(freq, time, dur, type, peak){
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, time);
    o.connect(g); g.connect(musicGain);
    g.gain.setValueAtTime(0.0001, time);
    g.gain.linearRampToValueAtTime(peak, time + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, time + dur);
    o.start(time); o.stop(time + dur + 0.03);
  }
  function mHat(time){
    const src = actx.createBufferSource(); src.buffer = noiseBuffer;
    const hp = actx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 7000;
    const g = actx.createGain();
    src.connect(hp); hp.connect(g); g.connect(musicGain);
    g.gain.setValueAtTime(0.0001, time);
    g.gain.linearRampToValueAtTime(0.05, time + 0.004);
    g.gain.exponentialRampToValueAtTime(0.0001, time + 0.05);
    src.start(time); src.stop(time + 0.06);
  }
  function scheduleStep(step, time){
    const lead = leadAt[step];
    if (lead && lead.f) mNote(lead.f, time, lead.d * 0.92, 'square', 0.12);
    const bass = bassAt[step];
    if (bass && bass.f) mNote(bass.f, time, bass.d * 0.85, 'square', 0.15);
    if (step % 4 === 2) mHat(time);
  }
  function musicScheduler(){
    if (!musicOn || !actx) return;
    if (nextStepTime < actx.currentTime) nextStepTime = actx.currentTime + 0.05;
    let guard = 0;
    while (nextStepTime < actx.currentTime + 0.12 && guard++ < 16){
      scheduleStep(stepIndex, nextStepTime);
      nextStepTime += secPerStep;
      stepIndex = (stepIndex + 1) % STEPS;
    }
  }
  function startMusic(){
    ensureAudio();
    if (!actx || musicOn) return;
    if (actx.state === 'suspended') actx.resume();
    if (!musicGain){ musicGain = actx.createGain(); musicGain.connect(actx.destination); }
    if (!noiseBuffer){
      noiseBuffer = actx.createBuffer(1, Math.floor(actx.sampleRate * 0.2), actx.sampleRate);
      const chd = noiseBuffer.getChannelData(0);
      for (let i = 0; i < chd.length; i++) chd[i] = Math.random() * 2 - 1;
    }
    musicGain.gain.cancelScheduledValues(actx.currentTime);
    musicGain.gain.setValueAtTime(0.0001, actx.currentTime);
    musicGain.gain.linearRampToValueAtTime(musicVolume(), actx.currentTime + 0.3);
    musicOn = true; stepIndex = 0; nextStepTime = actx.currentTime + 0.08;
    musicTimer = setInterval(musicScheduler, 25);
  }
  function stopMusic(){
    musicOn = false;
    if (musicTimer){ clearInterval(musicTimer); musicTimer = null; }
    if (musicGain && actx){
      musicGain.gain.cancelScheduledValues(actx.currentTime);
      musicGain.gain.setValueAtTime(musicGain.gain.value, actx.currentTime);
      musicGain.gain.linearRampToValueAtTime(0.0001, actx.currentTime + 0.15);
    }
  }

  muteBtn.addEventListener('click', () => {
    muted = !muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
    localStorage.setItem('sizzleMuted', muted ? '1' : '0');
    if (!muted) resumeAudio();
    if (musicGain && actx) musicGain.gain.setTargetAtTime(musicVolume(), actx.currentTime, 0.03);
  });

  // ---------- helpers ----------
  function clamp(v, a, b){ return v < a ? a : (v > b ? b : v); }
  function angNorm(a){ a %= Math.PI * 2; if (a > Math.PI) a -= Math.PI * 2; if (a < -Math.PI) a += Math.PI * 2; return a; }
  function ptOnRing(a, r){ return [cx + Math.cos(a) * r, cy + Math.sin(a) * r]; }

  function addParticles(x, y, hue, n){
    for (let i = 0; i < n; i++){
      const ang = Math.random() * Math.PI * 2;
      const sp = 60 + Math.random() * 180;
      particles.push({ x, y, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 40, life: 1, hue });
    }
  }
  function addFloat(text, x, y, color){ floats.push({ text, x, y, life: 1, color: color || '#ff5f2e' }); }

  // ---------- game flow ----------
  function updateStrikes(){
    const left = STRIKES_MAX - strikes;
    elStrikes.textContent = '🍢'.repeat(Math.max(0, left)) + '🔥'.repeat(strikes);
  }
  function updateHud(){
    elScore.textContent = score;
    elBest.textContent = 'best ' + best;
    updateStrikes();
  }
  function relocateFlame(){
    const gap = 1.1 + Math.random() * 3.2;            // rad ahead of the arm (travel time)
    flame = angNorm(arm + dir * gap);
    prevErr = angNorm(flame - arm);
    enteredWindow = false;
    armed = false;
    cooldown = COOLDOWN;
  }
  function reset(){
    arm = -Math.PI / 2; dir = 1; omega = OMEGA0;
    score = 0; combo = 0; strikes = 0;
    searsUntilReverse = 5; reverseTelegraph = 0; cooldown = 0;
    particles = []; floats = []; flyers = []; embers = []; plated = 0; firstTapDone = false;
    relocateFlame();
    updateHud();
  }
  function start(){
    resumeAudio();
    reset();
    state = 'playing';
    startOverlay.classList.add('hidden');
    overOverlay.classList.add('hidden');
    lbBox.classList.add('hidden');
    hint.classList.remove('hidden');
    elScoreWrap.classList.remove('hidden');
    startMusic();
  }
  function speedUp(){
    omega = clamp(omega + 0.14, OMEGA0, OMEGA_MAX);
    searsUntilReverse -= 1;
    if (searsUntilReverse <= 0 && reverseTelegraph <= 0){ reverseTelegraph = REVERSE_WARN; crankAngle = -Math.PI / 2; crankTick = 0; }   // telegraph a flip
  }
  function afterResolve(){
    if (!firstTapDone){ firstTapDone = true; hint.classList.add('hidden'); }
    relocateFlame();
  }
  function sear(perfect, fx, fy){
    if (perfect){
      combo += 1;
      const pts = 10 * combo;
      score += pts;
      addParticles(fx, fy, 42, 16);
      addFloat(combo > 1 ? 'PERFECT x' + combo : 'PERFECT!', fx, fy - 8, '#ff8a1e');
      flyers.push({ x: fx, y: fy, life: 1, rot: Math.random() * 6, vrot: (Math.random() * 2 - 1) * 9, jit: Math.random() * 16 - 8 });
      plated += 1;
      sound('perfect'); buzz(18);
    } else {
      combo = 0;
      score += 3;
      addFloat('ok', fx, fy - 8, '#b8703a');
      sound('ok'); buzz(6);
    }
    speedUp();
    updateHud();
    afterResolve();
  }
  function strike(fx, fy, label){
    strikes += 1; combo = 0;
    shake = 0.35;
    addFloat(label, fx, fy - 8, '#d0341b');
    sound('strike'); buzz(30);
    updateHud();
    if (strikes >= STRIKES_MAX){ gameOver(); return; }
    afterResolve();
  }
  function attemptSear(){
    if (state !== 'playing' || cooldown > 0) return;
    const err = angNorm(flame - arm), ae = Math.abs(err);
    const p = ptOnRing(flame, R);
    if (ae <= PERFECT) sear(true, p[0], p[1]);
    else if (ae <= WINDOW) sear(false, p[0], p[1]);
    else strike(cx + Math.cos(arm) * R, cy + Math.sin(arm) * R, 'MISS!');
  }
  function gameOver(){
    state = 'over';
    reverseTelegraph = 0;
    sound('over'); buzz(45);
    stopMusic();
    const isBest = score > best;
    if (isBest){ best = score; localStorage.setItem('sizzleBest', String(best)); }
    updateHud();
    elFinal.textContent = score;
    elNewBest.textContent = isBest && score > 0 ? '🎉 new record!' : '';
    if (score >= 400){ elOverTitle.textContent = 'Chef!'; elOverEmoji.textContent = '🤩'; }
    else if (score >= 120){ elOverTitle.textContent = 'Well done!'; elOverEmoji.textContent = '😋'; }
    else { elOverTitle.textContent = 'Burnt!'; elOverEmoji.textContent = '🔥'; }
    const finalScore = score;
    if (window.Leaderboard && window.Leaderboard.isConfigured()) lbPrefetch = window.Leaderboard.top(GAME_ID, 10);
    setTimeout(() => { overOverlay.classList.remove('hidden'); elScoreWrap.classList.add('hidden'); showLeaderboard(finalScore); }, 650);
  }

  // ---------- leaderboard ----------
  const GAME_ID = 'sizzle';
  let lbPendingScore = 0;
  let lbPrefetch = null;

  function cleanName(s){ return String(s).replace(/[^A-Za-z0-9 _-]/g, '').slice(0, 12); }
  function renderBoard(list, meRank){
    if (!list || !list.length){ lbList.innerHTML = ''; return; }
    lbList.innerHTML = list.map((e, i) => {
      const cls = (i + 1) === meRank ? ' class="me"' : '';
      const sc = Math.max(0, Math.floor(Number(e.score) || 0));
      return '<li' + cls + '><span class="lb-rank">' + (i + 1) + '</span>' +
             '<span class="lb-name">' + cleanName(e.name) + '</span>' +
             '<span class="lb-score">' + sc + '</span></li>';
    }).join('');
  }
  async function showLeaderboard(finalScore){
    if (!window.Leaderboard || !window.Leaderboard.isConfigured()){ lbBox.classList.add('hidden'); return; }
    lbPendingScore = finalScore;
    lbBox.classList.remove('hidden');
    lbEntry.classList.add('hidden');
    lbList.innerHTML = '';
    lbStatus.textContent = 'loading leaderboard…';
    const board = await (lbPrefetch || window.Leaderboard.top(GAME_ID, 10));
    lbPrefetch = null;
    if (!board){ lbStatus.textContent = 'leaderboard unavailable'; return; }
    renderBoard(board, -1);
    lbStatus.textContent = '';
    const qualifies = finalScore > 0 && (board.length < 10 || finalScore > board[board.length - 1].score);
    if (qualifies){
      lbEntry.classList.remove('hidden');
      lbName.value = localStorage.getItem('sizzleName') || '';
      try { lbName.focus(); } catch (e){ /* best-effort */ }
    }
  }
  async function saveScore(){
    const name = window.Leaderboard.sanitizeName(lbName.value);
    localStorage.setItem('sizzleName', name);
    lbSave.disabled = true;
    lbStatus.textContent = 'sending…';
    const res = await window.Leaderboard.submit(GAME_ID, name, lbPendingScore);
    lbSave.disabled = false;
    if (!res){ lbStatus.textContent = 'send failed, try again'; return; }
    lbEntry.classList.add('hidden');
    renderBoard(res.top || [], res.rank || -1);
    lbStatus.textContent = (res.rank && res.rank > 0) ? ('you are #' + res.rank + ' 🎉') : 'saved!';
  }
  lbSave.addEventListener('click', saveScore);
  lbName.addEventListener('input', () => { lbName.value = cleanName(lbName.value); });
  lbName.addEventListener('keydown', (e) => { if (e.code === 'Enter'){ e.preventDefault(); saveScore(); } });

  // ---------- update + render ----------
  function update(dt){
    clock += dt;
    if (shake > 0) shake = Math.max(0, shake - dt * 1.5);

    if (state === 'playing'){
      if (cooldown > 0) cooldown = Math.max(0, cooldown - dt);
      // reversal telegraph: the crank turns the new way and the spit eases toward a stop
      if (reverseTelegraph > 0){
        reverseTelegraph -= dt;
        const cstep = 5.2 * dt;
        crankAngle += (-dir) * cstep;
        crankTick += cstep;
        if (crankTick >= 0.8){ crankTick = 0; sound('click'); }   // ratchet tick
        if (reverseTelegraph <= 0){
          dir *= -1;
          searsUntilReverse = 4 + Math.floor(Math.random() * 4);
          enteredWindow = false; armed = false; cooldown = COOLDOWN;   // keep the fire where it is; re-approach from the new side
          sound('clunk');
        }
      }
      arm = angNorm(arm + dir * omega * dt);
      // a miss counts only once the piece has ENTERED the sear window and then LEFT it
      // untapped, so the whole [-WINDOW, +WINDOW] stays tappable (early AND late)
      if (cooldown <= 0){
        const ae = Math.abs(angNorm(flame - arm));
        if (!armed){
          if (ae > WINDOW) armed = true;          // wait until the arm is clear of the fire before arming a fresh approach
        } else if (ae <= WINDOW){
          enteredWindow = true;
        } else if (enteredWindow){
          const p = ptOnRing(flame, R);
          strike(p[0], p[1], 'MISSED');
        }
      }
      // rising embers from the fire
      if (Math.random() < dt * 26){
        const fp = ptOnRing(flame, R);
        embers.push({ x: fp[0] + (Math.random() * 2 - 1) * 12, y: fp[1], vx: (Math.random() * 2 - 1) * 18, vy: -30 - Math.random() * 40, life: 1, r: 1.5 + Math.random() * 2.2 });
      }
    }

    for (const p of particles){ p.vy += 520 * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt * 1.5; }
    particles = particles.filter((p) => p.life > 0);
    for (const f of floats){ f.y -= dt * 46; f.life -= dt * 1.1; }
    floats = floats.filter((f) => f.life > 0);
    for (const fl of flyers){ fl.life -= dt * 1.6; fl.rot = (fl.rot || 0) + (fl.vrot || 0) * dt; }
    flyers = flyers.filter((fl) => fl.life > 0);
    for (const e of embers){ e.x += e.vx * dt; e.y += e.vy * dt; e.vy += 6 * dt; e.life -= dt * 0.9; }
    embers = embers.filter((e) => e.life > 0);
  }

  function render(){
    // warm background + heat glow behind the grill
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#ffe7c4');
    bg.addColorStop(1, '#ffab72');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
    const heat = ctx.createRadialGradient(cx, cy + R * 0.2, R * 0.2, cx, cy + R * 0.2, R * 2.1);
    heat.addColorStop(0, 'rgba(255,150,55,.30)');
    heat.addColorStop(1, 'rgba(255,150,55,0)');
    ctx.fillStyle = heat; ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,.26)';
    ctx.beginPath(); ctx.arc(W * 0.16, H * 0.13, 40, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,150,90,.14)';
    ctx.beginPath(); ctx.arc(W * 0.85, H * 0.24, 56, 0, 7); ctx.fill();
    ctx.restore();

    const sx = shake > 0 ? (Math.random() * 2 - 1) * shake * 8 : 0;
    const sy = shake > 0 ? (Math.random() * 2 - 1) * shake * 8 : 0;
    ctx.save();
    ctx.translate(sx, sy);

    // serving plate + the pile of seared pieces
    drawPlate();

    // spit path ring
    ctx.save();
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.lineWidth = 12; ctx.strokeStyle = 'rgba(120,70,35,.10)'; ctx.stroke();
    ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(120,70,35,.22)'; ctx.setLineDash([3, 12]); ctx.stroke(); ctx.setLineDash([]);
    ctx.restore();

    // (reversal telegraph is drawn as a crank over the hub, below)

    // fire: soft glow + layered flame
    const fp = ptOnRing(flame, R);
    const pulse = 1 + Math.sin(clock * 12) * 0.12;
    ctx.save();
    const glow = ctx.createRadialGradient(fp[0], fp[1], 2, fp[0], fp[1], R * 0.62 * pulse);
    glow.addColorStop(0, 'rgba(255,140,40,.55)');
    glow.addColorStop(1, 'rgba(255,140,40,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(fp[0], fp[1], R * 0.62 * pulse, 0, 7); ctx.fill();
    ctx.restore();
    drawFlame(fp[0], fp[1], 28 * pulse);

    // embers rising from the fire (additive glow)
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const e of embers){
      ctx.globalAlpha = clamp(e.life, 0, 1) * 0.8;
      ctx.fillStyle = 'rgba(255,180,70,1)';
      ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, 7); ctx.fill();
    }
    ctx.restore();

    // spit: a wooden rod with a metal tip + decorative chunks (a proper skewer)
    const tip = ptOnRing(arm, R);
    const rodEnd = ptOnRing(arm, R + 20);
    const tipEnd = ptOnRing(arm, R + 31);
    ctx.save();
    ctx.lineCap = 'round';
    ctx.strokeStyle = 'rgba(60,30,12,.22)'; ctx.lineWidth = 10;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(rodEnd[0], rodEnd[1]); ctx.stroke();
    const ag = ctx.createLinearGradient(cx, cy, rodEnd[0], rodEnd[1]);
    ag.addColorStop(0, '#6f4522'); ag.addColorStop(0.5, '#b98547'); ag.addColorStop(1, '#7c4f28');
    ctx.strokeStyle = ag; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(rodEnd[0], rodEnd[1]); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,238,205,.5)'; ctx.lineWidth = 2.5;
    const hlA = ptOnRing(arm, R * 0.25), hlB = ptOnRing(arm, R + 12);
    ctx.beginPath(); ctx.moveTo(hlA[0], hlA[1]); ctx.lineTo(hlB[0], hlB[1]); ctx.stroke();
    ctx.strokeStyle = '#cfcfd6'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(rodEnd[0], rodEnd[1]); ctx.lineTo(tipEnd[0], tipEnd[1]); ctx.stroke();
    ctx.restore();
    // decorative chunks along the skewer
    const ck0 = ptOnRing(arm, R * 0.4), ck1 = ptOnRing(arm, R * 0.6), ck2 = ptOnRing(arm, R * 0.8);
    drawPiece(ck0[0], ck0[1], 10, 0.75);
    drawPiece(ck1[0], ck1[1], 11, 0.55);
    drawPiece(ck2[0], ck2[1], 12, 0.35);

    // the main piece on the tip (glows hotter near the fire)
    const err = Math.abs(angNorm(flame - arm));
    const near = clamp(1 - err / WINDOW, 0, 1);
    drawPiece(tip[0], tip[1], 18, 0.15);
    if (near > 0.05){
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const hot = ctx.createRadialGradient(tip[0], tip[1], 2, tip[0], tip[1], 22);
      hot.addColorStop(0, 'rgba(255,180,60,' + (near * 0.75) + ')');
      hot.addColorStop(1, 'rgba(255,120,40,0)');
      ctx.fillStyle = hot; ctx.beginPath(); ctx.arc(tip[0], tip[1], 22, 0, 7); ctx.fill();
      ctx.restore();
    }

    // hub knob
    const hg = ctx.createRadialGradient(cx - 3, cy - 3, 1, cx, cy, 12);
    hg.addColorStop(0, '#d3aa72'); hg.addColorStop(1, '#6e4423');
    ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(cx, cy, 12, 0, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.45)'; ctx.beginPath(); ctx.arc(cx - 3.5, cy - 3.5, 3, 0, 7); ctx.fill();

    // reversal telegraph: a big rotisserie hand-crank turning the NEW way
    if (reverseTelegraph > 0){
      ctx.save();
      ctx.translate(cx, cy);
      ctx.globalAlpha = 0.35 + 0.35 * Math.abs(Math.sin(clock * 9));
      const gl = ctx.createRadialGradient(0, 0, 4, 0, 0, 104);
      gl.addColorStop(0, 'rgba(255,170,60,.6)'); gl.addColorStop(1, 'rgba(255,170,60,0)');
      ctx.fillStyle = gl; ctx.beginPath(); ctx.arc(0, 0, 104, 0, 7); ctx.fill();
      ctx.globalAlpha = 1;
      // metal hub plate + center bolt
      const cg = ctx.createRadialGradient(-6, -6, 2, 0, 0, 31);
      cg.addColorStop(0, '#ececf2'); cg.addColorStop(1, '#7d7d86');
      ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(0, 0, 31, 0, 7); ctx.fill();
      ctx.strokeStyle = '#54545c'; ctx.lineWidth = 3; ctx.stroke();
      ctx.fillStyle = '#3a3a40'; ctx.beginPath(); ctx.arc(0, 0, 6, 0, 7); ctx.fill();
      // crank arm
      const kx = Math.cos(crankAngle) * 66, ky = Math.sin(crankAngle) * 66;
      ctx.strokeStyle = '#6a6a72'; ctx.lineWidth = 15; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(kx, ky); ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,.22)'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(kx, ky); ctx.stroke();
      // perpendicular grip handle at the end
      const px = Math.cos(crankAngle + Math.PI / 2), py = Math.sin(crankAngle + Math.PI / 2);
      const gh = 22;
      ctx.strokeStyle = '#2f2f35'; ctx.lineWidth = 20; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(kx - px * gh, ky - py * gh); ctx.lineTo(kx + px * gh, ky + py * gh); ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,.2)'; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.moveTo(kx - px * gh, ky - py * gh); ctx.lineTo(kx + px * gh, ky + py * gh); ctx.stroke();
      ctx.restore();
    }

    // seared flyers arcing onto the plate
    const plateY = H * 0.9 - 10;
    for (const fl of flyers){
      const t = clamp(1 - fl.life, 0, 1);
      const tx = fl.x + (cx - fl.x) * t;
      const ty = fl.y + (plateY - fl.y) * t - Math.sin(t * Math.PI) * 46;
      ctx.save();
      ctx.globalAlpha = clamp(fl.life * 1.4, 0, 1);
      ctx.translate(tx, ty); ctx.rotate(fl.rot || 0);
      drawPiece(0, 0, 14, 1, fl.jit || 0);
      ctx.restore();
    }

    // spark particles (additive)
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const p of particles){
      ctx.globalAlpha = clamp(p.life, 0, 1);
      ctx.fillStyle = 'hsl(' + p.hue + ',95%,62%)';
      ctx.beginPath(); ctx.arc(p.x, p.y, 3.4 * p.life + 0.6, 0, 7); ctx.fill();
    }
    ctx.restore();

    // combo readout
    if (state === 'playing' && combo >= 2){
      ctx.save();
      ctx.textAlign = 'center';
      const cs = 1 + Math.min(combo, 12) * 0.04 + Math.sin(clock * 10) * 0.04;
      ctx.translate(cx, cy - R * 0.42); ctx.scale(cs, cs);
      ctx.font = '800 30px ui-rounded, "SF Pro Rounded", Nunito, system-ui, sans-serif';
      ctx.lineWidth = 5; ctx.strokeStyle = 'rgba(255,255,255,.85)';
      ctx.strokeText('x' + combo, 0, 0);
      const cg = ctx.createLinearGradient(0, -16, 0, 12);
      cg.addColorStop(0, '#ffd24a'); cg.addColorStop(1, '#ff5f2e');
      ctx.fillStyle = cg; ctx.fillText('x' + combo, 0, 0);
      ctx.restore();
    }

    // floats
    for (const f of floats){
      ctx.save();
      ctx.globalAlpha = clamp(f.life, 0, 1);
      const scale = 1 + 0.25 * clamp(f.life, 0, 1);
      ctx.translate(f.x, f.y); ctx.scale(scale, scale);
      ctx.font = '800 20px ui-rounded, "SF Pro Rounded", Nunito, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(255,255,255,.9)';
      ctx.strokeText(f.text, 0, 0);
      ctx.fillStyle = f.color; ctx.fillText(f.text, 0, 0);
      ctx.restore();
    }

    ctx.restore();
  }

  function drawFlame(x, y, s){
    ctx.save();
    ctx.translate(x, y);
    const wob = Math.sin(clock * 16) * s * 0.09;
    function shape(sc, off){
      ctx.beginPath();
      ctx.moveTo(off, -s * sc);
      ctx.quadraticCurveTo(s * 0.7 * sc + off, -s * 0.2 * sc, s * 0.5 * sc, s * 0.4 * sc);
      ctx.quadraticCurveTo(s * 0.2 * sc, s * 0.9 * sc, 0, s * 0.7 * sc);
      ctx.quadraticCurveTo(-s * 0.2 * sc, s * 0.9 * sc, -s * 0.5 * sc, s * 0.4 * sc);
      ctx.quadraticCurveTo(-s * 0.7 * sc + off, -s * 0.2 * sc, off, -s * sc);
      ctx.closePath();
    }
    shape(1, wob);
    let g = ctx.createLinearGradient(0, -s, 0, s * 0.7);
    g.addColorStop(0, '#ff8a2e'); g.addColorStop(1, '#ff3b2e');
    ctx.fillStyle = g; ctx.fill();
    shape(0.6, wob * 0.5);
    g = ctx.createLinearGradient(0, -s * 0.6, 0, s * 0.5);
    g.addColorStop(0, '#ffd24a'); g.addColorStop(1, '#ff8a2e');
    ctx.fillStyle = g; ctx.fill();
    shape(0.3, 0);
    ctx.fillStyle = '#fff3c4'; ctx.fill();
    ctx.restore();
  }

  function drawPiece(x, y, r, t, jit){
    ctx.save();
    ctx.fillStyle = 'rgba(90,45,20,.18)';
    ctx.beginPath(); ctx.ellipse(x, y + r * 0.7, r * 0.95, r * 0.45, 0, 0, 7); ctx.fill();
    const lt = clamp(66 - 22 * clamp(t, 0, 1) + (jit || 0), 24, 70);   // cooked = browner; jit shifts each piece lighter/darker
    const g = ctx.createLinearGradient(x, y - r, x, y + r);
    g.addColorStop(0, 'hsl(30,55%,' + lt + '%)');
    g.addColorStop(1, 'hsl(26,55%,' + Math.max(14, lt - 14) + '%)');
    ctx.beginPath(); ctx.arc(x, y, r, 0, 7); ctx.fillStyle = g; ctx.fill();
    ctx.lineWidth = Math.max(1, r * 0.12); ctx.strokeStyle = 'rgba(70,35,15,.42)'; ctx.stroke();
    ctx.strokeStyle = 'rgba(70,35,15,.3)'; ctx.lineWidth = Math.max(1, r * 0.1); ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x - r * 0.5, y - r * 0.16); ctx.lineTo(x + r * 0.5, y - r * 0.16);
    ctx.moveTo(x - r * 0.5, y + r * 0.22); ctx.lineTo(x + r * 0.5, y + r * 0.22);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,240,200,.5)';
    ctx.beginPath(); ctx.ellipse(x - r * 0.3, y - r * 0.38, r * 0.3, r * 0.16, -0.5, 0, 7); ctx.fill();
    ctx.restore();
  }

  function drawPlate(){
    const px = cx, py = H * 0.9;
    ctx.save();
    ctx.fillStyle = 'rgba(90,45,20,.16)';
    ctx.beginPath(); ctx.ellipse(px, py + 9, R * 0.9, 18, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#fff4e8';
    ctx.beginPath(); ctx.ellipse(px, py, R * 0.88, 22, 0, 0, 7); ctx.fill();
    ctx.fillStyle = '#efe0d0';
    ctx.beginPath(); ctx.ellipse(px, py - 2, R * 0.66, 14, 0, 0, 7); ctx.fill();
    const n = Math.min(plated, 7);
    for (let i = 0; i < n; i++){
      const a = i * 1.3 + 0.4;
      const rr = 7 + (i % 3) * 13;
      const jit = ((i * 37 + 11) % 17) - 8;
      drawPiece(px + Math.cos(a) * rr, py - 8 - (i % 2) * 9, 14, 1, jit);
    }
    ctx.restore();
  }

  // ---------- loop ----------
  let last = 0;
  function loop(ts){
    if (!last) last = ts;
    let dt = (ts - last) / 1000; last = ts;
    if (dt > 0.05) dt = 0.05;
    try { update(dt); render(); }
    catch (err){ if (window.console) console.error('[sizzle] frame error', err); }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ---------- input ----------
  canvas.addEventListener('pointerdown', (e) => {
    if (!e.isPrimary) return;
    e.preventDefault();
    resumeAudio();
    attemptSear();
  }, { passive: false });

  window.addEventListener('keydown', (e) => {
    const tgt = e.target;
    if (tgt && (tgt.tagName === 'INPUT' || tgt.tagName === 'TEXTAREA' || tgt.isContentEditable)) return;
    if (e.code === 'Space' || e.code === 'Enter'){
      e.preventDefault();
      resumeAudio();
      if (state === 'playing'){ attemptSear(); return; }
      if (!startOverlay.classList.contains('hidden') || !overOverlay.classList.contains('hidden')) start();
    }
  });

  document.getElementById('playBtn').addEventListener('click', start);
  document.getElementById('retryBtn').addEventListener('click', start);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible'){ resumeAudio(); if (state === 'playing') startMusic(); }
    else stopMusic();
  });

  updateHud();
  elScoreWrap.classList.add('hidden');   // start screen is showing

  // --- test seam: exposed only to the jsc suite, inert in the browser ---
  if (typeof window !== 'undefined' && window.__SIZZLE_TEST__){
    window.__SIZZLE_TEST__.api = {
      start, attemptSear, drawFlame,
      state: () => state,
      score: () => score,
      combo: () => combo,
      strikes: () => strikes,
      setArmToFlame: (offset) => { arm = angNorm(flame - (offset || 0)); prevErr = angNorm(flame - arm); cooldown = 0; },
      passFlame: () => { armed = true; enteredWindow = true; arm = angNorm(flame + dir * (WINDOW + 0.05)); cooldown = 0; }
    };
  }
})();
</script>
</body>
</html>
